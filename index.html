<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Q 리터러시 테스트</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (버전 18, crossorigin 추가로 안정성 확보) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (브라우저에서 JSX 변환) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #020617; /* slate-950 */
            margin: 0;
            padding: 0;
            color: white;
        }
        .break-keep { word-break: keep-all; }
        /* 터치 시 하이라이트 제거 (모바일 최적화) */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <!-- React 앱이 렌더링될 루트 컨테이너 -->
    <div id="root"></div>

    <!-- JSX 컴포넌트 스크립트 -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        // --- 아이콘 컴포넌트 ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            // 여러 개의 SVG 요소가 있는 경우 반드시 Fragment(<></>)로 감싸야 합니다.
            const icons = {
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                chevronLeft: <path d="m15 18-6-6 6-6"/>,
                refresh: <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0 0V3m0 5h5m7 12a9 9 0 0 1-9-9 9.75 9.75 0 0 1 6.74-2.74L21 16m0 0v5m0-5h-5"/>,
                book: <><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></>,
                trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
                check: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                xCircle: <><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></>,
                lightbulb: <><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>,
                target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                arrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- 퀴즈 데이터 ---
        const QUESTIONS = [
            { id: 1, text: "AI는 감정을 실제로 느낄 수 있다?", options: ["그렇다", "아니다"], answer: 1, explanation: "현재 AI는 감정을 모방하거나 텍스트로 표현할 순 있지만, 생물학적 감정을 실제로 느끼지는 못해요!" },
            { id: 2, text: "챗GPT가 가끔 거짓말을 하는 현상을 무엇이라 부를까?", options: ["할루시네이션", "델루전", "가스라이팅"], answer: 0, explanation: "전문 용어로 '할루시네이션(환각)'이라고 해요. AI가 확률적으로 가장 그럴듯한 답변을 찾다 보니 생기는 현상이죠." },
            { id: 3, text: "생성형 AI가 그린 그림은 저작권 보호를 완벽히 받는다?", options: ["그렇다", "아니다"], answer: 1, explanation: "현재 법적으로 AI 단독 생성물에 대해서는 저작권을 인정하지 않는 추세예요. 인간의 창작적 기여가 증명되어야 합니다." },
            { id: 4, text: "AI에게 질문을 잘 던지는 기술의 이름은?", options: ["코딩", "프롬프트 엔지니어링", "로그 분석"], answer: 1, explanation: "질문(프롬프트)을 설계하는 기술인 '프롬프트 엔지니어링'은 AI 시대의 핵심 역량 중 하나입니다." },
            { id: 5, text: "무료 AI 모델은 내가 입력한 데이터를 학습에 활용할 수도 있다?", options: ["그렇다", "아니다"], answer: 0, explanation: "대부분의 무료 모델은 데이터 최적화를 위해 사용자 입력을 학습에 써요. 민감한 정보 입력은 주의해야 해요!" },
            { id: 6, text: "딥페이크 기술은 오직 목소리 변조에만 사용된다?", options: ["그렇다", "아니다"], answer: 1, explanation: "얼굴 교체, 목소리 변조, 전신 생성 등 영상과 음성 전반에 걸쳐 사용되는 기술입니다." },
            { id: 7, text: "AI가 작성한 글을 그대로 과제로 내는 것은 윤리적 문제가 없다?", options: ["그렇다", "아니다"], answer: 1, explanation: "표절 및 부정행위로 간주될 수 있으며, 창의적 사고를 저해할 수 있어 가이드라인 준수가 필요해요." },
            { id: 8, text: "다음 중 이미지 생성 AI가 아닌 것은?", options: ["Midjourney", "DALL-E", "Excel"], answer: 2, explanation: "엑셀은 데이터 분석용 툴이죠! 미드저니와 달리는 대표적인 이미지 생성 AI입니다." },
            { id: 9, text: "AI는 스스로 새로운 데이터를 학습해서 능력을 키울 수 있다?", options: ["그렇다", "아니다"], answer: 0, explanation: "머신러닝 알고리즘을 통해 데이터를 분석하고 스스로 성능을 개선하는 것이 AI의 특징입니다." },
            { id: 10, text: "멀티모달(Multimodal) AI란?", options: ["다양한 입력을 처리함", "계산만 잘함"], answer: 0, explanation: "텍스트뿐만 아니라 이미지, 소리, 영상 등 여러 형태의 데이터를 동시에 이해하고 생성하는 AI를 말해요." },
            { id: 11, text: "AI는 100% 객관적이며 편향될 수 없다?", options: ["그렇다", "아니다"], answer: 1, explanation: "학습 데이터가 편향되어 있으면 AI도 인종, 성별 등에 대해 편향된 결과를 내놓을 수 있어요." },
            { id: 12, text: "최근 유행하는 'AI 프로필 사진'은 어떤 기술 기반일까?", options: ["생성형 AI", "단순 포토샵"], answer: 0, explanation: "스테이블 디퓨전 같은 생성형 AI가 사용자의 얼굴 특징을 학습해 새로운 이미지를 그려내는 방식이에요." },
            { id: 13, text: "AI 모델의 '파라미터(매개변수)'가 많을수록 성능이 대체로 좋다?", options: ["그렇다", "아니다"], answer: 0, explanation: "파라미터는 AI의 '뇌세포'와 같아요. 많을수록 더 복잡한 추론이 가능해지지만 비용도 많이 들죠." },
            { id: 14, text: "AI가 인간의 지능을 뛰어넘는 시점을 부르는 말은?", options: ["특이점(Singularity)", "종착점"], answer: 0, explanation: "기술 발전이 통제 불가능해지고 가속화되는 지점을 '특이점'이라고 부릅니다." },
            { id: 15, text: "AI 활용 태도: 나는 AI를 일상에서 적극적으로 활용하려 노력한다.", options: ["적극 활용", "보통/안함"], answer: 0, explanation: "지식도 중요하지만 실제 활용해보는 경험이 가장 큰 리터러시 능력이 됩니다!" }
        ];

        // --- 레벨 데이터 ---
        const LEVELS = [
            { id: 1, title: "Lv.1 아날로그 힙스터", range: [0, 3], color: "from-pink-500 to-rose-500", desc: "AI가 세상을 지배할까 봐 조금 무서운가요? 🤖 괜찮아요, 아직은 아날로그의 낭만을 즐기는 중이시군요!", study: "AI와 친해지기 위해 챗GPT에게 오늘 점심 메뉴부터 물어보세요.", tools: "ChatGPT (무료버전), 네이버 Clova X" },
            { id: 2, title: "Lv.2 럭키 뉴비", range: [4, 6], color: "from-orange-400 to-amber-500", desc: "AI라는 이름은 익숙하지만, 아직은 검색창이 더 편한 당신! 🍀 행운의 첫걸음을 떼셨네요.", study: "AI가 거짓말을 할 수 있다는 사실(할루시네이션)을 항상 기억하세요.", tools: "Microsoft Copilot, Google Gemini" },
            { id: 3, title: "Lv.3 갓생 유망주", range: [7, 10], color: "from-emerald-400 to-teal-500", desc: "오~ 꽤 치시는데요? 🔥 AI를 도구로 써보려고 노력하는 갓생러의 향기가 납니다.", study: "원하는 결과를 얻기 위한 '프롬프트 작성법'을 조금만 더 파보세요.", tools: "Perplexity AI (검색용), Claude 3" },
            { id: 4, title: "Lv.4 AI 트렌드세터", range: [11, 13], color: "from-blue-500 to-indigo-600", desc: "이미 당신은 주변에서 'AI 좀 아는 사람'으로 통하고 있군요! 😎 최신 툴은 다 꿰고 계시죠?", study: "AI 윤리와 저작권 이슈 등 더 깊은 인문학적 고민을 더해보세요.", tools: "Midjourney, Suno (음악 생성)" },
            { id: 5, title: "Lv.5 디지털 신선", range: [14, 15], color: "from-purple-600 to-violet-700", desc: "인간인가 AI인가... 🧘‍♂️ 당신은 이미 AI와 물아일체! AI를 부리는 진정한 마스터입니다.", study: "직접 나만의 AI 에이전트를 만들거나 API를 활용해 생산성을 극한으로 높여보세요.", tools: "GPTs 제작, 자동화 툴 (Make, Zapier)" }
        ];

        // --- 메인 앱 컴포넌트 ---
        function App() {
            const [screen, setScreen] = useState('home'); 
            const [currentIdx, setCurrentIdx] = useState(0);
            const [userAnswers, setUserAnswers] = useState(new Array(QUESTIONS.length).fill(null));

            const startQuiz = () => {
                setCurrentIdx(0);
                setUserAnswers(new Array(QUESTIONS.length).fill(null));
                setScreen('quiz');
                window.scrollTo(0, 0);
            };

            const handleAnswer = (optionIdx) => {
                const isCorrect = optionIdx === QUESTIONS[currentIdx].answer;
                
                // 기존 배열 복사 및 업데이트
                const newAnswers = [...userAnswers];
                newAnswers[currentIdx] = { 
                    questionIdx: currentIdx, 
                    selected: optionIdx, 
                    isCorrect: isCorrect 
                };
                setUserAnswers(newAnswers);
                
                // 약간의 딜레이 후 다음 문제로 (UX 개선)
                setTimeout(() => {
                    if (currentIdx < QUESTIONS.length - 1) {
                        setCurrentIdx(currentIdx + 1);
                    } else {
                        setScreen('result');
                        window.scrollTo(0, 0);
                    }
                }, 200);
            };

            const goBack = () => {
                if (currentIdx > 0) {
                    setCurrentIdx(currentIdx - 1);
                }
            };

            const calculateScore = () => {
                let score = 0;
                for (let i = 0; i < userAnswers.length; i++) {
                    if (userAnswers[i] && userAnswers[i].isCorrect) {
                        score += 1;
                    }
                }
                return score;
            };

            const getLevel = () => {
                const score = calculateScore();
                const level = LEVELS.find(lv => score >= lv.range[0] && score <= lv.range[1]);
                return level ? level : LEVELS[0];
            };

            // 화면: 시작(홈)
            const Home = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center">
                    <div className="relative mb-8">
                        <div className="absolute -inset-1 bg-gradient-to-r from-purple-600 to-emerald-400 rounded-full blur opacity-75 animate-pulse"></div>
                        <div className="relative px-8 py-4 bg-slate-900 rounded-full leading-none flex items-center">
                            <span className="text-emerald-400 font-bold tracking-widest uppercase text-xs">AI-Q Test</span>
                        </div>
                    </div>
                    <h1 className="text-4xl md:text-6xl font-black text-white mb-6 leading-tight break-keep">
                        당신의 <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-emerald-400">AI 지능은</span><br/>몇 점일까요?
                    </h1>
                    <p className="text-slate-400 text-lg mb-12 max-w-md break-keep">
                        MZ세대 필수 소양, AI 리터러시!<br/>MBTI처럼 힙하게 측정해보고 등급을 확인하세요.
                    </p>
                    <button 
                        onClick={startQuiz}
                        className="group relative inline-flex items-center justify-center px-10 py-4 font-bold text-white transition-all duration-200 bg-purple-600 rounded-xl hover:bg-purple-500 focus:outline-none"
                    >
                        테스트 시작하기
                        <Icon name="chevronRight" className="ml-2 w-5 h-5 group-hover:translate-x-1 transition-transform" />
                    </button>
                </div>
            );

            // 화면: 퀴즈 풀이
            const Quiz = () => (
                <div className="min-h-screen flex flex-col items-center justify-center p-6">
                    <div className="w-full max-w-xl">
                        <div className="flex justify-between items-center mb-4">
                            <button 
                                onClick={goBack} 
                                disabled={currentIdx === 0}
                                className={`flex items-center text-sm font-bold transition-opacity ${currentIdx === 0 ? 'opacity-0 pointer-events-none' : 'opacity-100 text-slate-400 hover:text-white'}`}
                            >
                                <Icon name="chevronLeft" className="w-4 h-4 mr-1" /> 이전 문제
                            </button>
                            <span className="text-purple-400 font-bold">Step {currentIdx + 1} / {QUESTIONS.length}</span>
                        </div>
                        <div className="w-full bg-slate-800 h-2 rounded-full mb-12 overflow-hidden">
                            <div 
                                className="h-full bg-gradient-to-r from-purple-500 to-emerald-400 rounded-full transition-all duration-300"
                                style={{ width: `${((currentIdx + 1) / QUESTIONS.length) * 100}%` }}
                            ></div>
                        </div>
                        <h2 className="text-2xl md:text-3xl font-bold mb-10 leading-snug break-keep">
                            {QUESTIONS[currentIdx].text}
                        </h2>
                        <div className="space-y-4">
                            {QUESTIONS[currentIdx].options.map((opt, i) => {
                                const isSelected = userAnswers[currentIdx]?.selected === i;
                                return (
                                    <button
                                        key={i}
                                        onClick={() => handleAnswer(i)}
                                        className={`w-full p-5 text-left border rounded-2xl transition-all active:scale-[0.98] flex items-center ${
                                            isSelected
                                            ? 'bg-purple-600/20 border-purple-500 ring-1 ring-purple-500' 
                                            : 'bg-slate-900 border-slate-800 hover:border-emerald-400'
                                        }`}
                                    >
                                        <span className={`w-8 h-8 rounded-full border flex items-center justify-center mr-4 text-sm font-bold ${
                                            isSelected ? 'bg-purple-500 border-purple-500 text-white' : 'border-slate-700 text-slate-500'
                                        }`}>
                                            {i + 1}
                                        </span>
                                        <span className="text-lg">{opt}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );

            // 화면: 결과 출력
            const Result = () => {
                const lv = getLevel();
                const score = calculateScore();
                return (
                    <div className="min-h-screen flex flex-col items-center p-6 py-12">
                        <div className={`w-full max-w-xl p-8 rounded-3xl bg-gradient-to-br ${lv.color} shadow-2xl mb-8 relative overflow-hidden`}>
                            <div className="absolute top-0 right-0 p-4 opacity-20">
                                <Icon name="trophy" className="w-24 h-24" />
                            </div>
                            <p className="text-white/80 font-bold mb-2 uppercase tracking-widest text-[10px]">Your AI Literacy Level</p>
                            <h2 className="text-3xl md:text-4xl font-black mb-4 break-keep leading-tight">{lv.title}</h2>
                            <div className="bg-white/20 backdrop-blur-md rounded-2xl p-4 mb-4">
                                <p className="text-base leading-relaxed break-keep">{lv.desc}</p>
                            </div>
                            <div className="flex items-center text-white/90 font-bold">
                                <Icon name="target" className="mr-2 w-5 h-5" />
                                <span>Score: {score} / {QUESTIONS.length}</span>
                            </div>
                        </div>

                        <div className="w-full max-w-xl space-y-4 mb-12">
                            <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                <h3 className="text-emerald-400 font-bold flex items-center mb-3 text-sm">
                                    <Icon name="lightbulb" className="mr-2 w-4 h-4" /> 레벨업 가이드
                                </h3>
                                <p className="text-slate-300 leading-relaxed break-keep text-sm">{lv.study}</p>
                            </div>
                            <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                <h3 className="text-purple-400 font-bold flex items-center mb-3 text-sm">
                                    <Icon name="book" className="mr-2 w-4 h-4" /> 추천 도구
                                </h3>
                                <p className="text-slate-300 text-sm">{lv.tools}</p>
                            </div>
                        </div>

                        <div className="w-full max-w-xl flex flex-col gap-4">
                            <button 
                                onClick={() => { setScreen('review'); window.scrollTo(0, 0); }}
                                className="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black rounded-xl transition-all flex items-center justify-center shadow-lg"
                            >
                                🧠 내 지능 업데이트 (오답 확인)
                            </button>
                            <div className="grid grid-cols-2 gap-4">
                                <button 
                                    onClick={startQuiz}
                                    className="py-4 border border-slate-700 hover:bg-slate-900 text-white font-bold rounded-xl transition-all flex items-center justify-center text-sm"
                                >
                                    <Icon name="refresh" className="mr-2 w-4 h-4" /> 다시하기
                                </button>
                                <button 
                                    onClick={() => { setScreen('all-levels'); window.scrollTo(0, 0); }}
                                    className="py-4 border border-slate-700 hover:bg-slate-900 text-white font-bold rounded-xl transition-all flex items-center justify-center text-sm"
                                >
                                    📊 전체 등급
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // 화면: 오답 노트
            const Review = () => (
                <div className="min-h-screen flex flex-col items-center p-6 py-12">
                    <div className="w-full max-w-xl mb-8 flex items-center justify-between">
                        <button onClick={() => setScreen('result')} className="text-slate-400 hover:text-white flex items-center font-bold text-sm">
                            <Icon name="arrowLeft" className="mr-2 w-4 h-4" /> 뒤로가기
                        </button>
                        <h2 className="text-lg font-bold">지능 업데이트</h2>
                    </div>
                    
                    <div className="w-full max-w-xl space-y-6">
                        {userAnswers.map((ans, i) => (
                            <div key={i} className={`p-6 rounded-2xl border ${ans && ans.isCorrect ? 'border-slate-800 bg-slate-900/50' : 'border-rose-900/50 bg-rose-950/20'}`}>
                                <div className="flex items-start justify-between mb-4">
                                    <span className="text-slate-500 font-bold text-xs">Q{i + 1}</span>
                                    {ans && ans.isCorrect ? (
                                        <span className="text-emerald-500 flex items-center text-[10px] font-bold bg-emerald-500/10 px-3 py-1 rounded-full uppercase">
                                            <Icon name="check" className="mr-1 w-3 h-3" /> CORRECT
                                        </span>
                                    ) : (
                                        <span className="text-rose-500 flex items-center text-[10px] font-bold bg-rose-500/10 px-3 py-1 rounded-full uppercase">
                                            <Icon name="xCircle" className="mr-1 w-3 h-3" /> WRONG
                                        </span>
                                    )}
                                </div>
                                <p className="text-lg font-bold mb-4 break-keep">{QUESTIONS[i].text}</p>
                                <div className="space-y-1 mb-4">
                                    <p className={`text-sm ${ans && ans.isCorrect ? 'text-emerald-400' : 'text-rose-400'}`}>
                                        내 선택: {ans ? QUESTIONS[i].options[ans.selected] : '(미답변)'}
                                    </p>
                                    {(!ans || !ans.isCorrect) && (
                                        <p className="text-sm text-emerald-400 font-bold">
                                            정답: {QUESTIONS[i].options[QUESTIONS[i].answer]}
                                        </p>
                                    )}
                                </div>
                                <div className="p-4 bg-slate-950 rounded-xl text-xs text-slate-400 border border-slate-800 break-keep">
                                    <span className="text-emerald-400 font-bold block mb-1 uppercase tracking-tighter">⚡ Insight</span>
                                    {QUESTIONS[i].explanation}
                                </div>
                            </div>
                        ))}
                    </div>

                    <button 
                        onClick={() => { setScreen('result'); window.scrollTo(0, 0); }}
                        className="mt-12 w-full max-w-xl py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition-all"
                    >
                        확인 완료
                    </button>
                </div>
            );

            // 화면: 전체 등급 안내
            const AllLevels = () => (
                <div className="min-h-screen flex flex-col items-center p-6 py-12">
                    <div className="w-full max-w-xl mb-12 flex items-center justify-between">
                        <button onClick={() => setScreen('result')} className="text-slate-400 hover:text-white flex items-center font-bold text-sm">
                            <Icon name="arrowLeft" className="mr-2 w-4 h-4" /> 뒤로가기
                        </button>
                        <h2 className="text-xl font-bold">전체 등급표</h2>
                    </div>

                    <div className="w-full max-w-xl space-y-4">
                        {LEVELS.map((lv) => (
                            <div key={lv.id} className={`p-6 rounded-2xl bg-gradient-to-r ${lv.color} relative overflow-hidden shadow-lg`}>
                                <div className="relative z-10">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="text-xl md:text-2xl font-black">{lv.title}</h3>
                                        <span className="text-[10px] font-bold bg-black/30 px-2 py-1 rounded">Score {lv.range[0]}-{lv.range[1]}</span>
                                    </div>
                                    <p className="text-xs text-white/90 break-keep">{lv.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    <button 
                        onClick={() => { setScreen('result'); window.scrollTo(0, 0); }}
                        className="mt-12 w-full max-w-xl py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition-all"
                    >
                        닫기
                    </button>
                </div>
            );

            // 메인 렌더링
            return (
                <div className="antialiased select-none overflow-x-hidden">
                    {screen === 'home' && <Home />}
                    {screen === 'quiz' && <Quiz />}
                    {screen === 'result' && <Result />}
                    {screen === 'review' && <Review />}
                    {screen === 'all-levels' && <AllLevels />}
                </div>
            );
        }

        // 앱 초기화 및 마운트
        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        } else {
            console.error("Root element not found");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 AI 트렌드 능력고사</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Inline SVG Icons to replace lucide-react in CDN environment
        const Icons = {
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
            RefreshCw: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
            Brain: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.54Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-2.54Z"/></svg>,
            Zap: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.71 12 2l1 10h7L12 22l-1-10H4z"/></svg>,
            MessageSquare: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
            Award: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>,
            Star: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        };

        const questions = [
            {
                id: 1,
                question: "ChatGPT에게 '우리 구청 맛집 추천해줘'라고 했더니, 없는 식당을 당당하게 추천한다. 이 현상의 MZ식 용어는?",
                options: [
                    { text: "AI의 구라", score: 0 },
                    { text: "할루시네이션(Hallucination)", score: 10 },
                    { text: "AI 사춘기", score: 5 },
                    { text: "데이터 렉", score: 0 }
                ]
            },
            {
                id: 2,
                question: "상사님이 '요즘 핫한 생성형 AI 좀 써봐'라고 하신다. 이때 내가 가장 먼저 떠올려야 할 사이트가 아닌 것은?",
                options: [
                    { text: "ChatGPT", score: 10 },
                    { text: "Claude (클로드)", score: 10 },
                    { text: "Gemini (제미나이)", score: 10 },
                    { text: "싸이월드", score: 0 }
                ]
            },
            {
                id: 3,
                question: "AI에게 '보고서 초안 써줘'라고 시킬 때, 더 좋은 답변을 얻기 위해 입력하는 정교한 명령어를 무엇이라 할까?",
                options: [
                    { text: "코딩", score: 0 },
                    { text: "로그인", score: 0 },
                    { text: "프롬프트(Prompt)", score: 10 },
                    { text: "매크로", score: 5 }
                ]
            },
            {
                id: 4,
                question: "이미지 생성 AI '미드저니'로 홍보 포스터를 만들려 한다. 다음 중 AI가 가장 그리기 어려워하는 것은?",
                options: [
                    { text: "화려한 도시 야경", score: 5 },
                    { text: "손가락 5개가 정확한 사람 손", score: 10 },
                    { text: "귀여운 강아지", score: 0 },
                    { text: "우주선", score: 0 }
                ]
            },
            {
                id: 5,
                question: "공공기관 보안 규정상, AI에 입력하면 '절대 안 되는' 데이터는?",
                options: [
                    { text: "오늘 점심 메뉴 의견", score: 0 },
                    { text: "비공개 공문 및 민원인 개인정보", score: 10 },
                    { text: "어제의 날씨 정보", score: 0 },
                    { text: "일반적인 인사말 문구", score: 0 }
                ]
            },
            {
                id: 6,
                question: "동료가 '이거 딥페이크 아냐?'라고 묻는다. 여기서 '딥페이크'란?",
                options: [
                    { text: "깊게 잠든 사람", score: 0 },
                    { text: "고성능 가짜 뉴스 사이트", score: 0 },
                    { text: "AI를 이용한 가짜 이미지/영상 합성", score: 10 },
                    { text: "컴퓨터의 깊은 저장공간", score: 0 }
                ]
            },
            {
                id: 7,
                question: "멀티모달(Multi-modal) AI라는 말이 나온다. 이게 무슨 뜻일까?",
                options: [
                    { text: "모델이 여러 명이다", score: 0 },
                    { text: "텍스트, 이미지, 음성 등 다양한 형식을 동시에 처리한다", score: 10 },
                    { text: "유행이 지난 AI를 말한다", score: 0 },
                    { text: "컴퓨터 사양이 아주 높아야 한다", score: 5 }
                ]
            },
            {
                id: 8,
                question: "AI가 작성한 답변이 너무 길어서 읽기 싫을 때, 우리가 가장 많이 하는 요청은?",
                options: [
                    { text: "3줄 요약해줘", score: 10 },
                    { text: "반성문 써와", score: 0 },
                    { text: "영어로 번역해", score: 5 },
                    { text: "일기장에 써", score: 0 }
                ]
            },
            {
                id: 9,
                question: "네이버에서 만든 한국어에 특화된 거대언어모델의 이름은?",
                options: [
                    { text: "하이퍼클로바X", score: 10 },
                    { text: "네이버봇", score: 0 },
                    { text: "K-GPT", score: 5 },
                    { text: "지식인AI", score: 0 }
                ]
            },
            {
                id: 10,
                question: "AI가 내 일자리를 뺏을까 봐 걱정하는 동료에게 해줄 가장 멋진 조언은?",
                options: [
                    { text: "그냥 포기하고 쉬자", score: 0 },
                    { text: "AI는 도구일 뿐, AI를 잘 쓰는 사람이 살아남는다", score: 10 },
                    { text: "컴퓨터를 아예 꺼버리자", score: 0 },
                    { text: "로봇이랑 싸워서 이기자", score: 0 }
                ]
            }
        ];

        const results = [
            {
                min: 0,
                max: 20,
                title: "AI 신생아 (응애~)",
                icon: <Icons.Brain className="w-16 h-16 text-pink-400" />,
                desc: "ChatGPT가 먹는 건가요? 아직 AI와는 내외하는 사이군요. 하지만 걱정 마세요! 오늘 강의만 들으면 당신도 AI 맛잘알이 될 수 있습니다.",
                tip: "일단 ChatGPT 가입부터 시작해볼까요?"
            },
            {
                min: 21,
                max: 40,
                title: "AI 걸음마 단계",
                icon: <Icons.Zap className="w-16 h-16 text-yellow-400" />,
                desc: "AI라는 말을 들어보긴 했지만, 아직은 거리두기 중! 가끔 날씨나 맛집 물어보는 용도로만 쓰시죠? 이제 업무 효율의 신세계를 맛볼 차례입니다.",
                tip: "프롬프트 한 줄만 잘 써도 퇴근이 1시간 빨라집니다."
            },
            {
                min: 41,
                max: 70,
                title: "스마트 공무원 (AI 실천가)",
                icon: <Icons.MessageSquare className="w-16 h-16 text-blue-400" />,
                desc: "AI를 적재적소에 활용할 줄 아시는군요! 요약이나 번역 정도는 가볍게 시키는 수준. 동료들에게 '이거 AI가 해준 거야'라고 은근히 뽐내보세요.",
                tip: "더 정교한 결과물을 위한 '페르소나 설정' 기법을 배워봅시다."
            },
            {
                min: 71,
                max: 90,
                title: "AI 마스터 (부서의 희망)",
                icon: <Icons.Award className="w-16 h-16 text-purple-400" />,
                desc: "AI를 자유자재로 다루는 능력자! 업무 보고서 초안부터 아이디어 기획까지 AI와 협업하시네요. 이미 부서 내에서 'AI 박사'로 통하고 계실지도?",
                tip: "보안 규정을 지키면서 더 고도화된 툴들을 조합하는 법을 익혀보세요."
            },
            {
                min: 91,
                max: 100,
                title: "AI 신선 (무릉도원 거주자)",
                icon: <Icons.Star className="w-16 h-16 text-amber-400" />,
                desc: "당신이 AI입니까, 아니면 AI가 당신입니까? 이미 AI의 원리를 꿰뚫고 계시군요. 오늘 강의는 강사님 대신 하셔도 될 정도입니다!",
                tip: "최신 AI 트렌드와 윤리적 활용법에 대해 깊이 있는 토론을 나눠봅시다."
            }
        ];

        function App() {
            const [step, setStep] = useState('start');
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [msg, setMsg] = useState(null);

            const handleStart = () => {
                setStep('quiz');
                setCurrentIdx(0);
                setScore(0);
            };

            const handleAnswer = (points) => {
                setScore(prev => prev + points);
                if (currentIdx < questions.length - 1) {
                    setCurrentIdx(prev => prev + 1);
                } else {
                    setStep('result');
                }
            };

            const getResultData = () => {
                return results.find(r => score >= r.min && score <= r.max) || results[0];
            };

            const copyToClipboard = () => {
                const resultData = getResultData();
                const text = `나의 AI 공무원 등급은 [${resultData.title}]! 당신의 레벨은?`;
                
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setMsg("결과가 복사되었습니다!");
                } catch (err) {
                    setMsg("복사 실패 ㅠㅠ 직접 복사해주세요.");
                }
                document.body.removeChild(textArea);
                setTimeout(() => setMsg(null), 2000);
            };

            if (step === 'start') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 fade-in">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden text-center p-8 border-t-8 border-indigo-500">
                            <div className="mb-6 flex justify-center">
                                <div className="bg-indigo-100 p-4 rounded-full">
                                    <Icons.Brain className="w-12 h-12 text-indigo-600" />
                                </div>
                            </div>
                            <h1 className="text-3xl font-extrabold text-slate-800 mb-2 leading-tight">
                                2026 AI 트렌드 <br />능력고사
                            </h1>
                            <p className="text-slate-500 mb-8 font-medium">
                                나의 AI 상식 수준은 몇 점?<br />MZ식 테스트로 알아보는 공직자 AI 레벨
                            </p>
                            <button
                                onClick={handleStart}
                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 text-lg shadow-lg shadow-indigo-200"
                            >
                                응시하기 <Icons.ChevronRight />
                            </button>
                            <div className="mt-6 text-xs text-slate-400 italic">
                                * 본 테스트는 재미를 위한 것입니다.
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'quiz') {
                const q = questions[currentIdx];
                const progress = ((currentIdx + 1) / questions.length) * 100;

                return (
                    <div className="min-h-screen flex items-center justify-center p-4 fade-in">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-6 relative">
                            <div className="w-full bg-slate-100 h-2 rounded-full mb-8">
                                <div className="bg-indigo-500 h-2 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                            </div>
                            <div className="mb-2 text-indigo-500 font-bold text-sm tracking-wider uppercase">
                                Question {currentIdx + 1} / {questions.length}
                            </div>
                            <h2 className="text-xl font-bold text-slate-800 mb-8 leading-snug min-h-[4rem]">
                                {q.question}
                            </h2>
                            <div className="space-y-3">
                                {q.options.map((opt, i) => (
                                    <button
                                        key={i}
                                        onClick={() => handleAnswer(opt.score)}
                                        className="w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 transition-colors group flex items-center justify-between"
                                    >
                                        <span className="text-slate-700 font-medium group-hover:text-indigo-700">{opt.text}</span>
                                        <div className="text-slate-300 group-hover:text-indigo-400"><Icons.ChevronRight /></div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            const resultData = getResultData();

            return (
                <div className="min-h-screen bg-indigo-600 flex items-center justify-center p-4 fade-in">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden p-8 text-center relative">
                        {msg && (
                            <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg animate-bounce">
                                {msg}
                            </div>
                        )}
                        <div className="mb-4 text-indigo-600 font-black text-xl uppercase tracking-widest">TEST RESULT</div>
                        <div className="flex justify-center mb-6">
                            <div className="bg-indigo-50 p-6 rounded-full border-4 border-indigo-100">
                                {resultData.icon}
                            </div>
                        </div>
                        <h3 className="text-sm text-slate-500 font-bold mb-1">나의 AI 레벨은...</h3>
                        <h2 className="text-4xl font-black text-indigo-700 mb-4">{resultData.title}</h2>
                        <div className="bg-slate-50 rounded-2xl p-4 mb-6 text-slate-600 leading-relaxed text-sm">
                            {resultData.desc}
                        </div>
                        <div className="bg-indigo-50 border-2 border-indigo-100 rounded-2xl p-4 mb-8 text-left">
                            <div className="flex items-center gap-2 mb-2">
                                <Icons.Zap className="w-5 h-5 text-indigo-500" />
                                <span className="font-bold text-indigo-800 uppercase text-xs">Level Up Tip</span>
                            </div>
                            <p className="text-indigo-700 text-sm font-medium">{resultData.tip}</p>
                        </div>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <button onClick={handleStart} className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 text-sm">
                                <Icons.RefreshCw /> 다시 하기
                            </button>
                            <button onClick={copyToClipboard} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 text-sm">
                                결과 공유
                            </button>
                        </div>
                        <div className="pt-4 border-t border-slate-100">
                            <p className="text-[10px] text-slate-400 italic">
                                잠시 후 진행될 강의에서 '{resultData.title}' 탈출 비법을 공개합니다!
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
